name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            artifact: moneyman-linux
          - os: macos-latest
            name: macOS
            artifact: moneyman-macos
          - os: windows-latest
            name: Windows
            artifact: moneyman-windows

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qt5compat'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev catch2 libcups2-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install sqlcipher catch2
          echo "PKG_CONFIG_PATH=$(brew --prefix sqlcipher)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install sqlcipher:x64-windows

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ runner.os == 'Windows' && '-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake' || '' }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      # --- Package artifacts ---

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging
          cp build/moneyman staging/
          tar -czf moneyman-linux.tar.gz -C staging .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p staging
          cp build/moneyman staging/
          tar -czf moneyman-macos.tar.gz -C staging .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir staging
          Copy-Item build\Release\moneyman.exe staging\
          # Bundle Qt DLLs
          & windeployqt staging\moneyman.exe
          # Bundle any vcpkg runtime DLLs from build output
          Get-ChildItem build\Release\*.dll -ErrorAction SilentlyContinue | Copy-Item -Destination staging\
          Compress-Archive -Path staging\* -DestinationPath moneyman-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            moneyman-linux.tar.gz
            moneyman-macos.tar.gz
            moneyman-windows.zip
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Determine release name
        id: release_name
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          TAG="${GIT_REF#refs/tags/v}"
          echo "name=MoneyMan ${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_name.outputs.name }}
          generate_release_notes: true
          files: |
            moneyman-linux.tar.gz
            moneyman-macos.tar.gz
            moneyman-windows.zip
